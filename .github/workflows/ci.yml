name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:  # Allow manual trigger from GitHub UI

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.13"
  NODE_VERSION: "22"

jobs:
  # ═══════════════════════════════════════════════════════════════
  # Backend — install, lint (optional), test
  # ═══════════════════════════════════════════════════════════════
  backend:
    name: Backend (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: pip-${{ runner.os }}-

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pytest
        run: pytest -v --tb=short
        env:
          SECRET_KEY: ci-test-secret-key-not-for-production
          ADMIN_PASSWORD: ci-test-admin-password-not-for-production
          BAILIAN_API_KEY: ${{ secrets.BAILIAN_API_KEY || 'sk-dummy-key-for-ci' }}
          BAILIAN_BASE_URL: https://dashscope-intl.aliyuncs.com/compatible-mode/v1
          RATE_LIMIT_ENABLED: false

  # ═══════════════════════════════════════════════════════════════
  # Frontend — typecheck, lint, test
  # ═══════════════════════════════════════════════════════════════
  frontend:
    name: Frontend (typecheck + lint + vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type-check
        run: npx tsc -b

      - name: Lint (Oxlint)
        run: npm run lint

      - name: Run vitest
        run: npx vitest run --passWithNoTests

  # ═══════════════════════════════════════════════════════════════
  # Docker — verify both images build successfully
  # ═══════════════════════════════════════════════════════════════
  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    # Only build images on push to master (not on every PR)
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.backend
          push: false
          load: true
          tags: shopmind-backend:ci-${{ github.sha }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.frontend
          push: false
          load: true
          tags: shopmind-frontend:ci-${{ github.sha }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

  # ═══════════════════════════════════════════════════════════════
  # CD — push images to Docker Hub
  # ═══════════════════════════════════════════════════════════════
  deploy:
    name: Push to Docker Hub
    runs-on: ubuntu-latest
    needs: [docker]
    if: github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.backend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/shopmind-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/shopmind-backend:${{ github.sha }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.frontend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/shopmind-frontend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/shopmind-frontend:${{ github.sha }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend
